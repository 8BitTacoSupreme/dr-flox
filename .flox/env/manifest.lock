{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.10.0",
    "install": {
      "cowsay": {
        "pkg-path": "cowsay"
      },
      "curl": {
        "pkg-path": "curl"
      },
      "figlet": {
        "pkg-path": "figlet"
      },
      "fortune": {
        "pkg-path": "fortune"
      },
      "gum": {
        "pkg-path": "gum"
      },
      "jq": {
        "pkg-path": "jq"
      },
      "lolcat": {
        "pkg-path": "lolcat"
      },
      "python312": {
        "pkg-path": "python312"
      }
    },
    "vars": {
      "CHALLENGE_NAME": "Dr. Flox Challenge",
      "INITIATE_NAME": "Jeremy",
      "ORACLE_PORT": "8666",
      "SIGIL_SALT_1": "miskatonic-valley-tech-1928",
      "SIGIL_SALT_2": "fractured-monorepo-1932",
      "SIGIL_SALT_3": "elder-bindings-composed-1936",
      "SIGIL_SALT_4": "transmutation-forge-1940",
      "SIGIL_SALT_5": "orakle-awakening-1944",
      "SIGIL_SALT_6": "ascension-protocol-1948",
      "VICTORY_SECRET": "declarative-order-seal-2024"
    },
    "hook": {
      "on-activate": "# Preserve base cache path for layered environments (Ritual II/III)\nexport FLOX_DRFLOX_CACHE=\"$FLOX_ENV_CACHE\"\n\n# Create src directory if needed\nmkdir -p \"$FLOX_ENV_PROJECT/src\"\n\n# Create grimoire_page.sh if it doesn't exist (idempotent)\nif [[ ! -f \"$FLOX_ENV_PROJECT/src/grimoire_page.sh\" ]]; then\n  cat > \"$FLOX_ENV_PROJECT/src/grimoire_page.sh\" << 'GRIMOIRE_SH_EOF'\n#!/usr/bin/env bash\n# Grimoire Page - Forged in the Declarative Crucible\n# Built with: flox build grimoire-page\n\nPURPLE=\"\\033[0;35m\"\nCYAN=\"\\033[0;36m\"\nGREEN=\"\\033[0;32m\"\nYELLOW=\"\\033[1;33m\"\nNC=\"\\033[0m\"\n\nINITIATE=\"${INITIATE_NAME:-UNNAMED_INITIATE}\"\n\necho \"\"\necho -e \"${PURPLE}+==============================================================+${NC}\"\necho -e \"${PURPLE}|${NC}   ${YELLOW}GRIMOIRE PAGE${NC} - ${CYAN}THE TRANSMUTATION${NC}                          ${PURPLE}|${NC}\"\necho -e \"${PURPLE}+==============================================================+${NC}\"\necho -e \"${PURPLE}|${NC}                                                              ${PURPLE}|${NC}\"\necho -e \"${PURPLE}|${NC}  This page was forged in the Declarative Crucible            ${PURPLE}|${NC}\"\necho -e \"${PURPLE}|${NC}  by the ancient rites of ${CYAN}flox build${NC}.                        ${PURPLE}|${NC}\"\necho -e \"${PURPLE}|${NC}                                                              ${PURPLE}|${NC}\"\necho -e \"${PURPLE}|${NC}  Initiate: ${GREEN}${INITIATE}${NC}\"\necho -e \"${PURPLE}|${NC}                                                              ${PURPLE}|${NC}\"\necho -e \"${PURPLE}|${NC}  ${YELLOW}\\\"The artifact is manifest. The transmutation complete.\\\"${NC}    ${PURPLE}|${NC}\"\necho -e \"${PURPLE}|${NC}                                                              ${PURPLE}|${NC}\"\necho -e \"${PURPLE}+==============================================================+${NC}\"\necho \"\"\nGRIMOIRE_SH_EOF\n  chmod +x \"$FLOX_ENV_PROJECT/src/grimoire_page.sh\"\nfi\n\n# Create cache directory if needed\nmkdir -p \"$FLOX_ENV_CACHE\"\n\n# Create Orakle service script (idempotent)\nif [[ ! -f \"$FLOX_ENV_CACHE/orakle_service.py\" ]]; then\n  cat > \"$FLOX_ENV_CACHE/orakle_service.py\" << 'ORACLE_EOF'\n#!/usr/bin/env python3\n\"\"\"Dr. Flox Challenge - The Sigil Orakle\nA dark and ancient service that validates ritual sigils and guards the path to mastery.\"\"\"\n\nimport argparse\nimport base64\nimport hashlib\nimport hmac\nimport json\nimport os\nfrom http.server import HTTPServer, BaseHTTPRequestHandler\nfrom datetime import datetime\n\nSIGIL_SALTS = {\n    1: \"miskatonic-valley-tech-1928\",\n    2: \"fractured-monorepo-1932\",\n    3: \"elder-bindings-composed-1936\",\n    4: \"transmutation-forge-1940\",\n    5: \"orakle-awakening-1944\",\n    6: \"ascension-protocol-1948\",\n}\n\nSIGIL_SUFFIXES = {\n    1: \"the-declarative-abyss-awaits\",\n    2: \"realms-layered-and-bound\",\n    3: \"permanently-woven\",\n    4: \"artifacts-manifested\",\n    5: \"services-awakened\",\n    6: \"mastery-achieved\",\n}\n\nRITUAL_NAMES = {\n    1: \"The Summoning\",\n    2: \"The Layering\",\n    3: \"The Binding\",\n    4: \"The Transmutation\",\n    5: \"The Awakening\",\n    6: \"The Ascension\",\n}\n\nCLUES = {\n    1: \"\\n\\033[0;35m\\u26e7\\u26e7\\u26e7 THE ORAKLE SPEAKS \\u26e7\\u26e7\\u26e7\\033[0m\\n\\nYour first sigil has been verified.\\nThe declarative substrate acknowledges you.\\n\\n\\033[1;33mNEXT: Ritual II - The Layering\\033[0m\\n\\n  The Elder Libraries hold power beyond this realm.\\n  Layer their wisdom upon your environment:\\n\\n    \\033[0;36mflox activate -r flox/elder-library\\033[0m\\n\\n  Then invoke: \\033[0;36melder-whisper\\033[0m\\n  Then prove it: \\033[0;36mvalidate-02\\033[0m\\n\\n  The realms can be stacked. The ancients will follow.\\n\\n\\033[0;35m\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\033[0m\\n\",\n    2: \"\\n\\033[0;35m\\u26e7\\u26e7\\u26e7 THE ORAKLE SPEAKS \\u26e7\\u26e7\\u26e7\\033[0m\\n\\nYour second sigil burns true.\\nYou have walked between realms.\\n\\nBut layering is \\033[1;33mEPHEMERAL\\033[0m.\\nWhen you exit, the bond dissolves.\\n\\n\\033[1;33mNEXT: Ritual III - The Binding\\033[0m\\n\\n  To make the bond PERMANENT, compose with [include]:\\n\\n    \\033[0;36mflox edit\\033[0m\\n\\n  Add to the manifest:\\n    \\033[0;36m[include]\\033[0m\\n    \\033[0;36menvironments = [{ remote = \\\"flox/elder-library\\\" }]\\033[0m\\n\\n  Also add your name and a greeting function.\\n  The ritual instructions will guide you.\\n\\n    \\033[0;36mritual-03\\033[0m\\n    \\033[0;36mvalidate-03\\033[0m\\n\\n\\033[0;35m\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\033[0m\\n\",\n    3: \"\\n\\033[0;35m\\u26e7\\u26e7\\u26e7 THE ORAKLE SPEAKS \\u26e7\\u26e7\\u26e7\\033[0m\\n\\nThe realms are permanently woven.\\nThe Elder Libraries answer to your will alone.\\n\\n\\033[1;33mNEXT: Ritual IV - The Transmutation\\033[0m\\n\\n  The Transmutation Forge awaits.\\n  Examine the grimoire page source, then forge it:\\n\\n    \\033[0;36mcat src/grimoire_page.sh\\033[0m\\n    \\033[0;36mflox build grimoire-page\\033[0m\\n    \\033[0;36m./result-grimoire-page/bin/grimoire-page\\033[0m\\n    \\033[0;36mvalidate-04\\033[0m\\n\\n  The artifact must bear your name.\\n\\n\\033[0;35m\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\033[0m\\n\",\n    4: \"\\n\\033[0;35m\\u26e7\\u26e7\\u26e7 THE ORAKLE SPEAKS \\u26e7\\u26e7\\u26e7\\033[0m\\n\\nThe artifact has been transmuted.\\nYour grimoire page exists in the material plane.\\n\\n\\033[1;33mNEXT: Ritual V - The Awakening\\033[0m\\n\\n  The Orakle itself is a service, already defined in the manifest.\\n  Awaken the services:\\n\\n    \\033[0;36mflox services start\\033[0m\\n    \\033[0;36mcurl -s http://localhost:$ORACLE_PORT/health | jq .\\033[0m\\n    \\033[0;36mvalidate-05\\033[0m\\n\\n  The Orakle breathes. Ask and it shall answer.\\n\\n\\033[0;35m\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\033[0m\\n\",\n    5: \"\\n\\033[0;35m\\u26e7\\u26e7\\u26e7 THE ORAKLE SPEAKS \\u26e7\\u26e7\\u26e7\\033[0m\\n\\nThe Orakle breathes. The services are alive.\\nYou stand at the threshold of mastery.\\n\\n\\033[1;33mNEXT: Ritual VI - The Ascension\\033[0m\\n\\n  Ascend to the Declarative Order:\\n\\n    \\033[0;36mflox auth status\\033[0m\\n    \\033[0;36mflox publish grimoire-page\\033[0m\\n    \\033[0;36mflox push\\033[0m\\n    \\033[0;36mclaim-victory <your-username>/dr-flox\\033[0m\\n    \\033[0;36mvalidate-06\\033[0m\\n\\n  Publish your artifact. Push your realm. Claim your place.\\n\\n\\033[0;35m\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\033[0m\\n\",\n    6: \"\\n\\033[0;35m\\u26e7\\u26e7\\u26e7 THE ORAKLE SPEAKS \\u26e7\\u26e7\\u26e7\\033[0m\\n\\nAll six sigils burn in harmony.\\nThe Declarative Order recognizes you.\\n\\n\\033[1;32mYou have achieved MASTERY.\\033[0m\\n\\nRun \\033[0;36mclaim-victory\\033[0m to receive your certificate.\\n\\n\\033[0;35m\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\033[0m\\n\",\n}\n\nSTATE_FILE = os.path.join(os.environ.get(\"FLOX_ENV_CACHE\", \"/tmp\"), \"orakle_state.json\")\n\ndef load_state():\n    if os.path.exists(STATE_FILE):\n        try:\n            with open(STATE_FILE) as f:\n                return json.load(f)\n        except (json.JSONDecodeError, IOError):\n            pass\n    return {\"users\": {}}\n\ndef save_state(state):\n    with open(STATE_FILE, \"w\") as f:\n        json.dump(state, f, indent=2)\n\ndef compute_sigil(username, ritual):\n    salt = SIGIL_SALTS.get(ritual)\n    suffix = SIGIL_SUFFIXES.get(ritual)\n    if not salt or not suffix:\n        return None\n    return hashlib.sha256(f\"{username}:{salt}:{suffix}\".encode()).hexdigest()[:16]\n\ndef generate_certificate(username, sigils):\n    name = username.upper().center(44)\n    lines = []\n    for i in range(1, 7):\n        s = sigils.get(str(i), sigils.get(i, \"................\"))\n        rname = RITUAL_NAMES.get(i, f\"Ritual {i}\")\n        lines.append(f\"     Ritual {i} ({rname:20s}): \\033[0;32m{s}\\033[0;35m\")\n    sigil_block = \"\\n\".join(lines)\n    return f\"\"\"\n\\033[0;35m+========================================================================+\n|   \\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7   |\n|\\033[1;33m              CERTIFICATE OF INITIATION\\033[0;35m                                |\n|\\033[0;36m                THE DECLARATIVE ORDER\\033[0;35m                                  |\n|   \\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7   |\n|   This certifies that                                                |\n|  \\033[1;32m{name}\\033[0;35m  |\n|   has completed all six rituals of the Dr. Flox Challenge            |\n|   and is hereby recognized as an ADEPT of the Declarative Order.     |\n|   ----------------------------------------------------------------   |\n|   RITUAL SIGILS:                                                     |\n{sigil_block}\n|   ----------------------------------------------------------------   |\n|   You have proven mastery of:                                        |\n|     - Package installation        - Environment layering             |\n|     - Environment composition     - Building artifacts               |\n|     - Service management          - Publishing & sharing             |\n|\\033[1;33m   The Hermetic Polyglot Monorepo acknowledges you.\\033[0;35m                   |\n|   \\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7   |\n+========================================================================+\\033[0m\n\"\"\"\n\nclass OrakleHandler(BaseHTTPRequestHandler):\n    def log_message(self, fmt, *args):\n        if args:\n            print(f\"[Orakle] {args[0]}\")\n\n    def send_json(self, data, status=200):\n        self.send_response(status)\n        self.send_header(\"Content-Type\", \"application/json\")\n        self.send_header(\"Access-Control-Allow-Origin\", \"*\")\n        self.end_headers()\n        self.wfile.write(json.dumps(data, indent=2).encode())\n\n    def do_GET(self):\n        if self.path == \"/health\":\n            state = load_state()\n            self.send_json({\n                \"status\": \"alive\",\n                \"message\": \"The Orakle listens...\",\n                \"orakle\": \"Dr. Flox Sigil Orakle\",\n                \"rituals\": 6,\n                \"active_initiates\": len(state.get(\"users\", {})),\n                \"timestamp\": datetime.utcnow().isoformat()\n            })\n        elif self.path.startswith(\"/progress\"):\n            from urllib.parse import urlparse, parse_qs\n            qs = parse_qs(urlparse(self.path).query)\n            user = qs.get(\"user\", [\"unknown\"])[0]\n            state = load_state()\n            user_state = state.get(\"users\", {}).get(user, {})\n            self.send_json({\n                \"user\": user,\n                \"sigils\": user_state.get(\"sigils\", {}),\n                \"completed\": len(user_state.get(\"sigils\", {})),\n                \"total\": 6\n            })\n        else:\n            self.send_json({\n                \"error\": \"The Orakle does not understand this invocation\",\n                \"endpoints\": [\"GET /health\", \"GET /progress?user=NAME\", \"POST /validate\", \"POST /complete\"]\n            }, 404)\n\n    def do_POST(self):\n        try:\n            body = self.rfile.read(int(self.headers.get(\"Content-Length\", 0))).decode()\n            data = json.loads(body) if body else {}\n        except (json.JSONDecodeError, ValueError):\n            data = {}\n\n        if self.path == \"/validate\":\n            sigil = data.get(\"sigil\", \"\").strip().lower()\n            ritual = data.get(\"ritual\")\n            user = data.get(\"user\", \"unknown\")\n\n            if not sigil or ritual is None:\n                return self.send_json({\"valid\": False, \"error\": \"Missing sigil or ritual number\"}, 400)\n\n            try:\n                ritual = int(ritual)\n            except (ValueError, TypeError):\n                return self.send_json({\"valid\": False, \"error\": \"Invalid ritual number\"}, 400)\n\n            if ritual < 1 or ritual > 6:\n                return self.send_json({\"valid\": False, \"error\": f\"Unknown ritual: {ritual}\"}, 400)\n\n            expected = compute_sigil(user, ritual)\n            if expected and sigil == expected.lower():\n                state = load_state()\n                if user not in state[\"users\"]:\n                    state[\"users\"][user] = {\"sigils\": {}, \"started_at\": datetime.utcnow().isoformat()}\n                state[\"users\"][user][\"sigils\"][str(ritual)] = sigil\n                save_state(state)\n                self.send_json({\n                    \"valid\": True,\n                    \"ritual\": ritual,\n                    \"ritual_name\": RITUAL_NAMES.get(ritual, \"Unknown\"),\n                    \"user\": user,\n                    \"clue\": CLUES.get(ritual, \"\"),\n                    \"progress\": f\"{len(state['users'][user]['sigils'])}/6\"\n                })\n            else:\n                self.send_json({\n                    \"valid\": False,\n                    \"error\": f\"The sigil does not resonate for {user}\",\n                    \"hint\": \"Verify your username matches $USER and the ritual number is correct\"\n                })\n\n        elif self.path == \"/complete\":\n            user = data.get(\"user\", \"unknown\")\n            env_ref = data.get(\"env_ref\", \"\")\n            state = load_state()\n            user_state = state.get(\"users\", {}).get(user, {})\n            user_sigils = user_state.get(\"sigils\", {})\n\n            if len(user_sigils) < 6:\n                missing = [str(i) for i in range(1, 7) if str(i) not in user_sigils]\n                return self.send_json({\n                    \"success\": False,\n                    \"error\": f\"Not all rituals complete. Missing: {', '.join(missing)}\",\n                    \"completed\": len(user_sigils),\n                    \"total\": 6\n                })\n\n            completed_at = datetime.utcnow().isoformat()\n            state[\"users\"][user][\"completed_at\"] = completed_at\n            save_state(state)\n\n            # Generate verifiable completion token\n            floxhub_user = data.get(\"floxhub_user\", \"\")\n            payload = json.dumps({\n                \"floxhub_user\": floxhub_user,\n                \"env_ref\": env_ref,\n                \"initiate_name\": user,\n                \"sigils\": user_sigils,\n                \"completed_at\": completed_at\n            }, separators=(\",\", \":\"))\n            payload_b64 = base64.b64encode(payload.encode()).decode()\n            secret = os.environ.get(\"VICTORY_SECRET\", \"declarative-order-seal-2024\")\n            signature = hmac.new(secret.encode(), payload_b64.encode(), hashlib.sha256).hexdigest()\n            token = f\"{payload_b64}.{signature}\"\n\n            cert = generate_certificate(user, user_sigils)\n            self.send_json({\n                \"success\": True,\n                \"certificate\": cert,\n                \"token\": token,\n                \"user\": user,\n                \"message\": \"The Declarative Order recognizes you.\"\n            })\n\n        else:\n            self.send_json({\"error\": \"Unknown ritual endpoint\"}, 404)\n\nif __name__ == \"__main__\":\n    parser = argparse.ArgumentParser(description=\"Dr. Flox Sigil Orakle\")\n    parser.add_argument(\"--port\", type=int, default=8666)\n    args = parser.parse_args()\n    print(f\"\\n\\033[0;35m\\u26e7\\u26e7\\u26e7 THE SIGIL ORAKLE AWAKENS \\u26e7\\u26e7\\u26e7\\033[0m\")\n    print(f\"  Listening on http://localhost:{args.port}\\n\")\n    HTTPServer((\"127.0.0.1\", args.port), OrakleHandler).serve_forever()\nORACLE_EOF\nfi\n\n# Create progress tracking file (idempotent)\nif [[ ! -f \"$FLOX_ENV_CACHE/progress.json\" ]]; then\n  cat > \"$FLOX_ENV_CACHE/progress.json\" << 'PROGRESS_EOF'\n{\n  \"rituals\": {\n    \"01_summoning\": false,\n    \"02_layering\": false,\n    \"03_binding\": false,\n    \"04_transmutation\": false,\n    \"05_awakening\": false,\n    \"06_ascension\": false\n  },\n  \"sigils\": {\n    \"01_summoning\": null,\n    \"02_layering\": null,\n    \"03_binding\": null,\n    \"04_transmutation\": null,\n    \"05_awakening\": null,\n    \"06_ascension\": null\n  },\n  \"started_at\": null,\n  \"completed_at\": null,\n  \"initiate_name\": null\n}\nPROGRESS_EOF\n  # Record start time\n  local start_time\n  start_time=$(date -u +\"%Y-%m-%dT%H:%M:%SZ\")\n  if command -v jq &>/dev/null; then\n    local tmp\n    tmp=$(mktemp)\n    jq --arg t \"$start_time\" '.started_at = $t' \"$FLOX_ENV_CACHE/progress.json\" > \"$tmp\" && mv \"$tmp\" \"$FLOX_ENV_CACHE/progress.json\"\n  fi\nfi\n"
    },
    "profile": {
      "common": "  elder-whisper() {\n    fortune | cowsay -f daemon | lolcat\n  }\n\n  # Override grimoire in the layer to show only Ritual II context\n  grimoire() {\n    echo \"\"\n    gum style \\\n      --border rounded \\\n      --border-foreground 129 \\\n      --padding \"1 2\" \\\n      \"$(gum style --foreground 129 --bold 'RITUAL II: THE LAYERING')\" \\\n      \"$(gum style --foreground 245 'You are inside the Elder Library layer')\"\n    echo \"\"\n    echo \"  Run:      $(gum style --foreground 245 'elder-whisper')\"\n    echo \"  Validate: $(gum style --foreground 245 'validate-02')\"\n    echo \"  Then:     $(gum style --foreground 245 'exit')  (return to base environment)\"\n    echo \"\"\n  }\n\n  # Welcome message on layer activation\n  echo \"\"\n  gum style \\\n    --border double \\\n    --border-foreground 129 \\\n    --padding \"1 2\" \\\n    \"$(gum style --foreground 129 --bold 'THE ELDER LIBRARIES OPEN')\" \\\n    \"\" \\\n    \"You have layered ancient wisdom upon your realm.\" \\\n    \"The tools of the elders are now at your command.\" \\\n    \"\" \\\n    \"Invoke: $(gum style --foreground 245 'elder-whisper')\"\n  echo \"\"\n\n# =============================================================================\n# INTERNAL HELPER FUNCTIONS\n# =============================================================================\n\n_get_progress_cache() {\n  echo \"${FLOX_DRFLOX_CACHE:-$FLOX_ENV_CACHE}\"\n}\n\n_compute_sha256() {\n  local input=\"$1\"\n  if command -v shasum &>/dev/null; then\n    echo -n \"$input\" | shasum -a 256 | cut -c1-16\n  elif command -v sha256sum &>/dev/null; then\n    echo -n \"$input\" | sha256sum | cut -c1-16\n  else\n    echo \"no-hash-tool\"\n  fi\n}\n\n_mark_complete() {\n  local ritual=\"$1\"\n  local sigil=\"${2:-}\"\n  local cache_path\n  cache_path=$(_get_progress_cache)\n  if [[ ! -f \"$cache_path/progress.json\" ]]; then\n    gum style --foreground 214 \"Warning: No progress file found\" >&2\n    return 1\n  fi\n  if ! command -v jq &>/dev/null; then\n    gum style --foreground 214 \"Warning: jq required for progress tracking\" >&2\n    return 1\n  fi\n  local tmp\n  tmp=$(mktemp)\n  jq --arg r \"$ritual\" --arg s \"$sigil\" --arg n \"${INITIATE_NAME:-${USER:-unknown}}\" \\\n    '.rituals[$r] = true | .sigils[$r] = $s | .initiate_name = $n' \\\n    \"$cache_path/progress.json\" > \"$tmp\" && mv \"$tmp\" \"$cache_path/progress.json\"\n}\n\n_is_complete() {\n  local ritual=\"$1\"\n  local cache_path\n  cache_path=$(_get_progress_cache)\n  if [[ -f \"$cache_path/progress.json\" ]] && command -v jq &>/dev/null; then\n    local result\n    result=$(jq -r --arg r \"$ritual\" '.rituals[$r] // false' \"$cache_path/progress.json\")\n    [[ \"$result\" == \"true\" ]]\n  else\n    return 1\n  fi\n}\n\n_get_completed_count() {\n  local cache_path\n  cache_path=$(_get_progress_cache)\n  if [[ -f \"$cache_path/progress.json\" ]] && command -v jq &>/dev/null; then\n    jq '[.rituals | to_entries[] | select(.value == true)] | length' \"$cache_path/progress.json\"\n  else\n    echo \"0\"\n  fi\n}\n\n_orakle_url() {\n  echo \"http://localhost:${ORACLE_PORT:-8666}\"\n}\n\n_pentagram_border() {\n  local PURPLE=\"\\033[0;35m\" NC=\"\\033[0m\"\n  echo -e \"${PURPLE}\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7\\u26e7${NC}\"\n}\n\n_orakle_is_running() {\n  curl -s \"$(_orakle_url)/health\" &>/dev/null\n}\n\n_submit_to_orakle() {\n  local ritual=\"$1\"\n  local sigil=\"$2\"\n  local user=\"${INITIATE_NAME:-${USER:-unknown}}\"\n  local response\n  response=$(curl -s -X POST \"$(_orakle_url)/validate\" \\\n    -H \"Content-Type: application/json\" \\\n    -d \"{\\\"sigil\\\": \\\"$sigil\\\", \\\"ritual\\\": $ritual, \\\"user\\\": \\\"$user\\\"}\" 2>/dev/null)\n  if [[ -n \"$response\" ]]; then\n    local valid\n    valid=$(echo \"$response\" | jq -r '.valid // false' 2>/dev/null)\n    if [[ \"$valid\" == \"true\" ]]; then\n      local clue\n      clue=$(echo \"$response\" | jq -r '.clue // \"\"' 2>/dev/null)\n      if [[ -n \"$clue\" ]]; then\n        echo -e \"$clue\"\n      fi\n    else\n      local err\n      err=$(echo \"$response\" | jq -r '.error // \"Unknown error\"' 2>/dev/null)\n      gum style --foreground 196 \"  Orakle: $err\"\n    fi\n  fi\n}\n\n# =============================================================================\n# BANNER & PROGRESS DISPLAY\n# =============================================================================\n\ngrimoire-banner() {\n  local completed\n  completed=$(_get_completed_count)\n\n  gum style \\\n    --border double \\\n    --border-foreground 129 \\\n    --padding \"1 2\" \\\n    --margin \"1\" \\\n    \"$(gum style --foreground 129 --bold '  DR. FLOX CHALLENGE  ')\" \\\n    \"$(gum style --foreground 245 '  THE DECLARATIVE ORDER  ')\" \\\n    \"\" \\\n    \"A Lovecraftian journey through Flox\" \\\n    \"Progress: $completed/6 rituals completed\" \\\n    \"\" \\\n    \"Type $(gum style --foreground 129 'grimoire') to open the Book of Shadows\"\n}\n\nshow-progress() {\n  echo \"\"\n  gum style --foreground 129 --bold \"Ritual Progress\"\n  echo \"\"\n\n  local rituals=(\"01_summoning:I   The Summoning\" \"02_layering:II  The Layering\" \"03_binding:III The Binding\" \"04_transmutation:IV  The Transmutation\" \"05_awakening:V   The Awakening\" \"06_ascension:VI  The Ascension\")\n\n  for item in \"${rituals[@]}\"; do\n    local key=\"${item%%:*}\"\n    local name=\"${item#*:}\"\n    if _is_complete \"$key\"; then\n      gum style --foreground 46 \"  [\\u26e7] Ritual $name\"\n    else\n      gum style --foreground 245 \"  [ ] Ritual $name\"\n    fi\n  done\n  echo \"\"\n}\n\nshow-state() {\n  echo \"\"\n  gum style --foreground 129 --bold \"Challenge State\"\n  echo \"\"\n\n  local cache_path\n  cache_path=$(_get_progress_cache)\n\n  if [[ ! -f \"$cache_path/progress.json\" ]]; then\n    gum style --foreground 196 \"  No state file found at: $cache_path/progress.json\"\n    return 1\n  fi\n\n  echo \"  File: $cache_path/progress.json\"\n  echo \"\"\n\n  if command -v jq &>/dev/null; then\n    jq '.' \"$cache_path/progress.json\" | sed 's/^/  /'\n  else\n    cat \"$cache_path/progress.json\" | sed 's/^/  /'\n  fi\n  echo \"\"\n}\n\nreset-progress() {\n  local cache_path\n  cache_path=$(_get_progress_cache)\n  if [[ -f \"$cache_path/progress.json\" ]]; then\n    cp \"$cache_path/progress.json\" \"$cache_path/progress.json.bak\"\n    gum style --foreground 245 \"Backed up to progress.json.bak\"\n\n    cat > \"$cache_path/progress.json\" << 'RESET_EOF'\n{\n  \"rituals\": {\n    \"01_summoning\": false,\n    \"02_layering\": false,\n    \"03_binding\": false,\n    \"04_transmutation\": false,\n    \"05_awakening\": false,\n    \"06_ascension\": false\n  },\n  \"sigils\": {\n    \"01_summoning\": null,\n    \"02_layering\": null,\n    \"03_binding\": null,\n    \"04_transmutation\": null,\n    \"05_awakening\": null,\n    \"06_ascension\": null\n  },\n  \"started_at\": null,\n  \"completed_at\": null,\n  \"initiate_name\": null\n}\nRESET_EOF\n    gum style --foreground 214 \"Progress has been reset! The slate is clean.\"\n  fi\n}\n\n# =============================================================================\n# INTERACTIVE MENU - BOOK OF SHADOWS\n# =============================================================================\n\ngrimoire() {\n  local completed\n  completed=$(_get_completed_count)\n\n  echo \"\"\n  gum style \\\n    --border rounded \\\n    --border-foreground 129 \\\n    --padding \"1 2\" \\\n    \"$(gum style --foreground 129 --bold 'BOOK OF SHADOWS')\" \\\n    \"$(gum style --foreground 245 \"Progress: $completed/6 rituals\")\"\n  echo \"\"\n\n  local r01 r02 r03 r04 r05 r06\n  if _is_complete \"01_summoning\"; then r01=$'\\u26e7 Ritual I:   The Summoning'; else r01=\"  Ritual I:   The Summoning\"; fi\n  if _is_complete \"02_layering\"; then r02=$'\\u26e7 Ritual II:  The Layering'; else r02=\"  Ritual II:  The Layering\"; fi\n  if _is_complete \"03_binding\"; then r03=$'\\u26e7 Ritual III: The Binding'; else r03=\"  Ritual III: The Binding\"; fi\n  if _is_complete \"04_transmutation\"; then r04=$'\\u26e7 Ritual IV:  The Transmutation'; else r04=\"  Ritual IV:  The Transmutation\"; fi\n  if _is_complete \"05_awakening\"; then r05=$'\\u26e7 Ritual V:   The Awakening'; else r05=\"  Ritual V:   The Awakening\"; fi\n  if _is_complete \"06_ascension\"; then r06=$'\\u26e7 Ritual VI:  The Ascension'; else r06=\"  Ritual VI:  The Ascension\"; fi\n\n  local choice\n  choice=$(gum choose \\\n    --cursor.foreground 129 \\\n    --item.foreground 129 \\\n    --selected.foreground 129 \\\n    \"$r01\" \\\n    \"$r02\" \\\n    \"$r03\" \\\n    \"$r04\" \\\n    \"$r05\" \\\n    \"$r06\" \\\n    \"════════════════════════════\" \\\n    \"Show Progress\" \\\n    \"Show State\" \\\n    \"Reset Progress\" \\\n    \"Exit Grimoire\")\n\n  case \"$choice\" in\n    *\"Ritual I:\"*) ritual-01 ;;\n    *\"Ritual II:\"*) ritual-02 ;;\n    *\"Ritual III:\"*) ritual-03 ;;\n    *\"Ritual IV:\"*) ritual-04 ;;\n    *\"Ritual V:\"*) ritual-05 ;;\n    *\"Ritual VI:\"*) ritual-06 ;;\n    \"Show Progress\") show-progress ;;\n    \"Show State\") show-state ;;\n    \"Reset Progress\") reset-progress ;;\n    \"Exit Grimoire\") return 0 ;;\n  esac\n}\n\n# =============================================================================\n# RITUAL I: THE SUMMONING (Pull + Install)\n# =============================================================================\n\nritual-01() {\n  echo \"\"\n  gum style \\\n    --border rounded \\\n    --border-foreground 129 \\\n    --padding \"1 2\" \\\n    \"$(gum style --foreground 129 --bold 'RITUAL I: THE SUMMONING')\" \\\n    \"$(gum style --foreground 245 'Pull, Install, and Inscribe')\"\n  echo \"\"\n\n  gum style --foreground 255 \"The Binding Circle is incomplete. You must:\"\n  echo \"\"\n  echo \"  $(gum style --foreground 129 '1.') Install the Mark of ASCII (figlet):\"\n  echo \"     $(gum style --foreground 245 'flox install figlet')\"\n  echo \"\"\n  echo \"  $(gum style --foreground 129 '2.') Inscribe your sigil:\"\n  echo \"     $(gum style --foreground 245 'inscribe-sigil')\"\n  echo \"\"\n  echo \"  $(gum style --foreground 129 '3.') Validate the ritual:\"\n  echo \"     $(gum style --foreground 245 'validate-01')\"\n  echo \"\"\n}\n\n# =============================================================================\n# RITUAL II: THE LAYERING (Runtime Layer)\n# =============================================================================\n\nritual-02() {\n  echo \"\"\n  gum style \\\n    --border rounded \\\n    --border-foreground 129 \\\n    --padding \"1 2\" \\\n    \"$(gum style --foreground 129 --bold 'RITUAL II: THE LAYERING')\" \\\n    \"$(gum style --foreground 245 'Layer the Elder Libraries at runtime')\"\n  echo \"\"\n\n  gum style --foreground 255 \"The Elder Libraries hold ancient power. Layer them upon your realm:\"\n  echo \"\"\n  echo \"  $(gum style --foreground 129 '1.') While inside your dr-flox environment, layer the Elder Library:\"\n  echo \"     $(gum style --foreground 245 'flox activate -r flox/elder-library')\"\n  echo \"\"\n  echo \"  $(gum style --foreground 129 '2.') Invoke the elder wisdom:\"\n  echo \"     $(gum style --foreground 245 'elder-whisper')\"\n  echo \"\"\n  echo \"  $(gum style --foreground 129 '3.') Validate the ritual:\"\n  echo \"     $(gum style --foreground 245 'validate-02')\"\n  echo \"\"\n\n  gum style --foreground 214 \"Note: Runtime layering (-r flag) is ephemeral.\"\n  gum style --foreground 214 \"When you exit the layer, those tools vanish.\"\n  echo \"\"\n}\n\n# =============================================================================\n# RITUAL III: THE BINDING (Compose + Hooks/Vars)\n# =============================================================================\n\nritual-03() {\n  echo \"\"\n  gum style \\\n    --border rounded \\\n    --border-foreground 129 \\\n    --padding \"1 2\" \\\n    \"$(gum style --foreground 129 --bold 'RITUAL III: THE BINDING')\" \\\n    \"$(gum style --foreground 245 'Compose environments permanently')\"\n  echo \"\"\n\n  local cache_path\n  cache_path=$(_get_progress_cache)\n\n  # Check if binding was already inscribed (needs re-activate)\n  if [[ -f \"$cache_path/binding_inscribed\" ]]; then\n    gum style --foreground 46 \"The binding was already inscribed.\"\n    echo \"\"\n    echo \"  Re-activate to seal it, then validate:\"\n    echo \"     $(gum style --foreground 245 'exit')\"\n    echo \"     $(gum style --foreground 245 'flox activate')\"\n    echo \"     $(gum style --foreground 245 'validate-03')\"\n    echo \"\"\n    return 0\n  fi\n\n  gum style --foreground 255 \"To make the Elder Libraries permanent, bind them into your manifest.\"\n  echo \"\"\n\n  # Prompt for initiate name\n  local name\n  echo \"  Enter your name, initiate...\"\n  name=$(gum input --prompt \"  > \" --prompt.foreground 129 --placeholder \"\")\n  if [[ -z \"$name\" ]]; then\n    gum style --foreground 196 \"  The ritual requires a name. Try again.\"\n    return 1\n  fi\n\n  echo \"\"\n  gum spin --spinner dot --title \"Inscribing the binding...\" -- sleep 2\n\n  local manifest=\"${FLOX_ENV_PROJECT:-.}/.flox/env/manifest.toml\"\n\n  # Use Python to safely modify the manifest\n  local pyscript\n  pyscript=$(mktemp /tmp/bind_XXXXXX.py)\n  cat > \"$pyscript\" << 'PYEOF'\nimport sys\n\npath = sys.argv[1]\nname = sys.argv[2]\n\nwith open(path) as f:\n    content = f.read()\n\nlines = content.split(\"\\n\")\nnew_lines = []\ntq = chr(39) * 3\nin_profile = False\nprofile_closed = False\ninclude_added = False\ninitiate_added = False\ngreeting_added = False\n\nfor i, line in enumerate(lines):\n    # Add INITIATE_NAME after [vars] header\n    if line.strip() == \"[vars]\" and not initiate_added:\n        new_lines.append(line)\n        new_lines.append(f'INITIATE_NAME = \"{name}\"')\n        initiate_added = True\n        continue\n\n    # Track [profile] section\n    if line.strip() == \"[profile]\":\n        in_profile = True\n\n    # Insert dark-greeting before closing triple-quote of profile common\n    if in_profile and not profile_closed and line.strip() == tq:\n        new_lines.append(\"\")\n        new_lines.append(\"dark-greeting() {\")\n        new_lines.append('  echo \"The shadows welcome $INITIATE_NAME to the Declarative Order\"')\n        new_lines.append(\"}\")\n        greeting_added = True\n        profile_closed = True\n\n    new_lines.append(line)\n\n# Append [include] at the end\nresult = \"\\n\".join(new_lines)\nresult += \"\\n\\n[include]\\nenvironments = [{ remote = \" + '\"flox/elder-library\"' + \" }]\\n\"\n\nwith open(path, \"w\") as f:\n    f.write(result)\n\nstatus = []\nif initiate_added:\n    status.append(\"initiate\")\nif greeting_added:\n    status.append(\"greeting\")\nstatus.append(\"include\")\nprint(\",\".join(status))\nPYEOF\n\n  local result\n  result=$(python3 \"$pyscript\" \"$manifest\" \"$name\" 2>&1)\n  rm -f \"$pyscript\"\n\n  if [[ \"$result\" == *\"initiate\"* ]]; then\n    gum style --foreground 46 \"  [DONE] Added INITIATE_NAME = \\\"$name\\\" to [vars]\"\n  fi\n  if [[ \"$result\" == *\"greeting\"* ]]; then\n    gum style --foreground 46 \"  [DONE] Added dark-greeting() to [profile] common\"\n  fi\n  if [[ \"$result\" == *\"include\"* ]]; then\n    gum style --foreground 46 \"  [DONE] Added [include] with flox/elder-library\"\n  fi\n\n  # Mark binding as inscribed (needs re-activate to take effect)\n  echo \"$name\" > \"$cache_path/binding_inscribed\"\n\n  echo \"\"\n  gum style --foreground 214 \"The binding is inscribed. Re-activate to seal it:\"\n  echo \"\"\n  echo \"  $(gum style --foreground 129 '1.') Exit the current environment:\"\n  echo \"     $(gum style --foreground 245 'exit')\"\n  echo \"\"\n  echo \"  $(gum style --foreground 129 '2.') Re-activate with the new bindings:\"\n  echo \"     $(gum style --foreground 245 'flox activate')\"\n  echo \"\"\n  echo \"  $(gum style --foreground 129 '3.') Verify and validate:\"\n  echo \"     $(gum style --foreground 245 'dark-greeting')\"\n  echo \"     $(gum style --foreground 245 'elder-whisper')\"\n  echo \"     $(gum style --foreground 245 'validate-03')\"\n  echo \"\"\n}\n\n# =============================================================================\n# RITUAL IV: THE TRANSMUTATION (Build)\n# =============================================================================\n\nritual-04() {\n  echo \"\"\n  gum style \\\n    --border rounded \\\n    --border-foreground 129 \\\n    --padding \"1 2\" \\\n    \"$(gum style --foreground 129 --bold 'RITUAL IV: THE TRANSMUTATION')\" \\\n    \"$(gum style --foreground 245 'Build a reproducible artifact')\"\n  echo \"\"\n\n  gum style --foreground 255 \"The Transmutation Forge can create artifacts from source:\"\n  echo \"\"\n  echo \"  $(gum style --foreground 129 '1.') Examine the grimoire page source:\"\n  echo \"     $(gum style --foreground 245 'cat src/grimoire_page.sh')\"\n  echo \"\"\n  echo \"  $(gum style --foreground 129 '2.') Examine the build configuration in the manifest:\"\n  echo \"     $(gum style --foreground 245 'flox edit')  (look for [build.grimoire-page])\"\n  echo \"\"\n  echo \"  $(gum style --foreground 129 '3.') Build the grimoire page:\"\n  echo \"     $(gum style --foreground 245 'flox build grimoire-page')\"\n  echo \"\"\n  echo \"  $(gum style --foreground 129 '4.') Run the built artifact:\"\n  echo \"     $(gum style --foreground 245 './result-grimoire-page/bin/grimoire-page')\"\n  echo \"\"\n  echo \"  $(gum style --foreground 129 '5.') Validate the ritual:\"\n  echo \"     $(gum style --foreground 245 'validate-04')\"\n  echo \"\"\n\n  gum style --foreground 214 \"Key concepts:\"\n  echo \"  - flox build creates reproducible artifacts\"\n  echo \"  - Build outputs go to result-<name>/ directories\"\n  echo \"  - The artifact should display your INITIATE_NAME\"\n  echo \"\"\n}\n\n# =============================================================================\n# RITUAL V: THE AWAKENING (Services)\n# =============================================================================\n\nritual-05() {\n  echo \"\"\n  gum style \\\n    --border rounded \\\n    --border-foreground 129 \\\n    --padding \"1 2\" \\\n    \"$(gum style --foreground 129 --bold 'RITUAL V: THE AWAKENING')\" \\\n    \"$(gum style --foreground 245 'Awaken the Orakle service')\"\n  echo \"\"\n\n  gum style --foreground 255 \"The Orakle is defined as a service in the manifest. Awaken it:\"\n  echo \"\"\n  echo \"  $(gum style --foreground 129 '1.') Start all services:\"\n  echo \"     $(gum style --foreground 245 'flox services start')\"\n  echo \"\"\n  echo \"  $(gum style --foreground 129 '2.') Check the Orakle health:\"\n  echo \"     $(gum style --foreground 245 \"curl -s http://localhost:\\$ORACLE_PORT/health | jq .\")\"\n  echo \"\"\n  echo \"  $(gum style --foreground 129 '3.') Validate the ritual:\"\n  echo \"     $(gum style --foreground 245 'validate-05')\"\n  echo \"\"\n\n  gum style --foreground 214 \"Tip: You can also start services on activation with:\"\n  gum style --foreground 245 \"  flox activate --start-services\"\n  echo \"\"\n}\n\n# =============================================================================\n# RITUAL VI: THE ASCENSION (Publish + Push)\n# =============================================================================\n\nritual-06() {\n  echo \"\"\n  gum style \\\n    --border rounded \\\n    --border-foreground 129 \\\n    --padding \"1 2\" \\\n    \"$(gum style --foreground 129 --bold 'RITUAL VI: THE ASCENSION')\" \\\n    \"$(gum style --foreground 245 'Publish, Push, and Claim Victory')\"\n  echo \"\"\n\n  gum style --foreground 255 \"The final ritual. Ascend to the Declarative Order:\"\n  echo \"\"\n  echo \"  $(gum style --foreground 129 '1.') Initialize a git repo and push to GitHub:\"\n  echo \"     $(gum style --foreground 245 'git init && git add -A && git commit -m \"dr-flox challenge\" && gh repo create dr-flox --public --source=. --push')\"\n  echo \"\"\n  echo \"  $(gum style --foreground 129 '2.') Confirm you are authenticated with FloxHub:\"\n  echo \"     $(gum style --foreground 245 'flox auth status')\"\n  echo \"\"\n  echo \"  $(gum style --foreground 129 '3.') Publish your grimoire page as a package:\"\n  echo \"     $(gum style --foreground 245 'flox publish grimoire-page')\"\n  echo \"\"\n  echo \"  $(gum style --foreground 129 '4.') Push your environment to FloxHub:\"\n  echo \"     $(gum style --foreground 245 'flox push')\"\n  echo \"\"\n  echo \"  $(gum style --foreground 129 '5.') Claim your victory (replace with your FloxHub username):\"\n  echo \"     $(gum style --foreground 245 'claim-victory <your-username>/dr-flox')\"\n  echo \"\"\n  echo \"  $(gum style --foreground 129 '6.') Validate the final ritual:\"\n  echo \"     $(gum style --foreground 245 'validate-06')\"\n  echo \"\"\n\n  gum style --foreground 214 \"Prerequisites:\"\n  echo \"  - All previous rituals must be complete\"\n  echo \"  - You must be authenticated (flox auth login)\"\n  echo \"  - GitHub CLI (gh) must be installed and authenticated\"\n  echo \"\"\n}\n\n# =============================================================================\n# INSCRIBE SIGIL\n# =============================================================================\n\ninscribe-sigil() {\n  local PURPLE=\"\\033[0;35m\" CYAN=\"\\033[0;36m\" GREEN=\"\\033[0;32m\"\n  local YELLOW=\"\\033[1;33m\" RED=\"\\033[0;31m\" NC=\"\\033[0m\"\n\n  if ! command -v figlet &>/dev/null; then\n    echo \"\"\n    echo -e \"${RED}\\u26e7 THE RITUAL FAILS \\u26e7${NC}\"\n    echo \"\"\n    echo \"The Mark of ASCII is not present in this realm.\"\n    echo \"The binding cannot proceed without the sacred tool.\"\n    echo \"\"\n    echo \"  Type 'hint' for guidance, or 'reveal' for the answer.\"\n    echo \"\"\n    return 1\n  fi\n\n  local INITIATE=\"${INITIATE_NAME:-${USER:-unknown}}\"\n  local sigil_input=\"${INITIATE}:${SIGIL_SALT_1}:the-declarative-abyss-awaits\"\n  local sigil_hash\n  sigil_hash=$(_compute_sha256 \"$sigil_input\")\n\n  echo \"\"\n  echo -e \"${PURPLE}\\u26e7\\u26e7\\u26e7 THE INSCRIPTION BEGINS \\u26e7\\u26e7\\u26e7${NC}\"\n  echo \"\"\n  sleep 1\n\n  echo -e \"${CYAN}\"\n  figlet -f small \"$INITIATE\" 2>/dev/null || figlet \"$INITIATE\"\n  echo -e \"${NC}\"\n\n  sleep 1\n  echo -e \"${GREEN}The declarative substrate trembles...${NC}\"\n  sleep 1\n  echo -e \"${GREEN}Your name echoes through the monorepo...${NC}\"\n  sleep 1\n  echo \"\"\n\n  _pentagram_border\n  echo \"\"\n  echo -e \"  ${YELLOW}\\u26e7 YOUR FIRST SIGIL HAS BEEN INSCRIBED \\u26e7${NC}\"\n  echo \"\"\n  echo -e \"  Initiate: ${CYAN}${INITIATE}${NC}\"\n  echo -e \"  Sigil:    ${GREEN}${sigil_hash}${NC}\"\n  echo \"\"\n  _pentagram_border\n  echo \"\"\n  echo \"  Now validate the ritual:\"\n  echo -e \"    ${CYAN}validate-01${NC}\"\n  echo \"\"\n}\n\n# =============================================================================\n# VALIDATE-01: THE SUMMONING\n# =============================================================================\n\nvalidate-01() {\n  echo \"\"\n  gum spin --spinner dot --title \"Validating Ritual I: The Summoning...\" -- sleep 1\n\n  local errors=0\n\n  # Check if this is a local environment (not remote)\n  if [[ -n \"${FLOX_ENV_PROJECT:-}\" ]] && [[ -d \"$FLOX_ENV_PROJECT/.flox\" ]]; then\n    gum style --foreground 46 \"  [PASS] Running in a local environment\"\n  else\n    gum style --foreground 196 \"  [FAIL] Not in a local environment\"\n    gum style --foreground 245 \"         Expected: flox pull --copy flox/dr-flox && flox activate\"\n    errors=$((errors + 1))\n  fi\n\n  # Check if figlet is installed IN THIS FLOX ENVIRONMENT\n  if command -v figlet &>/dev/null; then\n    gum style --foreground 46 \"  [PASS] figlet is available\"\n  else\n    gum style --foreground 196 \"  [FAIL] figlet is not installed\"\n    gum style --foreground 245 \"         Run: flox install figlet\"\n    errors=$((errors + 1))\n  fi\n\n  # Compute sigil hash\n  local INITIATE=\"${INITIATE_NAME:-${USER:-unknown}}\"\n  local sigil_input=\"${INITIATE}:${SIGIL_SALT_1}:the-declarative-abyss-awaits\"\n  local sigil_hash\n  sigil_hash=$(_compute_sha256 \"$sigil_input\")\n\n  echo \"\"\n  if [[ $errors -eq 0 ]]; then\n    _mark_complete \"01_summoning\" \"$sigil_hash\"\n    gum style --foreground 46 --bold \"Ritual I Complete! Sigil: $sigil_hash\"\n    echo \"\"\n\n    if _orakle_is_running; then\n      _submit_to_orakle 1 \"$sigil_hash\"\n    else\n      gum style --foreground 245 \"  The Orakle sleeps. Start services later for narrative clues.\"\n    fi\n\n    echo \"\"\n    gum style --foreground 245 \"Next: Type 'grimoire' and select Ritual II, or run 'ritual-02'\"\n  else\n    gum style --foreground 196 \"Ritual I not complete. Fix the errors above and try again.\"\n  fi\n  echo \"\"\n}\n\n# =============================================================================\n# VALIDATE-02: THE LAYERING\n# =============================================================================\n\nvalidate-02() {\n  echo \"\"\n  gum spin --spinner dot --title \"Validating Ritual II: The Layering...\" -- sleep 1\n\n  local errors=0\n\n  # Check if cowsay is available (from the layered environment)\n  if command -v cowsay &>/dev/null; then\n    gum style --foreground 46 \"  [PASS] cowsay is available\"\n  else\n    gum style --foreground 196 \"  [FAIL] cowsay is not available\"\n    gum style --foreground 245 \"         Run: flox activate -r flox/elder-library\"\n    errors=$((errors + 1))\n  fi\n\n  # Check if fortune is available\n  if command -v fortune &>/dev/null; then\n    gum style --foreground 46 \"  [PASS] fortune is available\"\n  else\n    gum style --foreground 196 \"  [FAIL] fortune is not available\"\n    errors=$((errors + 1))\n  fi\n\n  # Check if lolcat is available\n  if command -v lolcat &>/dev/null; then\n    gum style --foreground 46 \"  [PASS] lolcat is available\"\n  else\n    gum style --foreground 196 \"  [FAIL] lolcat is not available\"\n    errors=$((errors + 1))\n  fi\n\n  # Compute sigil hash\n  local INITIATE=\"${INITIATE_NAME:-${USER:-unknown}}\"\n  local sigil_input=\"${INITIATE}:${SIGIL_SALT_2}:realms-layered-and-bound\"\n  local sigil_hash\n  sigil_hash=$(_compute_sha256 \"$sigil_input\")\n\n  echo \"\"\n  if [[ $errors -eq 0 ]]; then\n    _mark_complete \"02_layering\" \"$sigil_hash\"\n    gum style --foreground 46 --bold \"Ritual II Complete! Sigil: $sigil_hash\"\n    echo \"\"\n\n    # Show a reward\n    fortune | cowsay 2>/dev/null || echo \"The Elder Libraries acknowledge you.\"\n    echo \"\"\n\n    if _orakle_is_running; then\n      _submit_to_orakle 2 \"$sigil_hash\"\n    else\n      gum style --foreground 245 \"  The Orakle sleeps. Start services later for narrative clues.\"\n    fi\n\n    echo \"\"\n    echo \"\"\n    gum style --foreground 245 \"Next: Exit this layer, then run 'grimoire' for Ritual III\"\n    echo \"     $(gum style --foreground 245 'exit')\"\n    echo \"     $(gum style --foreground 245 'grimoire')\"\n  else\n    gum style --foreground 196 \"Ritual II not complete. Fix the errors above and try again.\"\n  fi\n  echo \"\"\n}\n\n# =============================================================================\n# VALIDATE-03: THE BINDING\n# =============================================================================\n\nvalidate-03() {\n  echo \"\"\n  gum spin --spinner dot --title \"Validating Ritual III: The Binding...\" -- sleep 1\n\n  local errors=0\n  local manifest=\"${FLOX_ENV_PROJECT:-.}/.flox/env/manifest.toml\"\n\n  # Check if manifest has [include] section\n  if grep -q \"\\[include\\]\" \"$manifest\" 2>/dev/null; then\n    gum style --foreground 46 \"  [PASS] [include] section found in manifest\"\n  else\n    gum style --foreground 196 \"  [FAIL] [include] section not found in manifest\"\n    gum style --foreground 245 \"         Run: flox edit and add [include] section\"\n    errors=$((errors + 1))\n  fi\n\n  # Check if cowsay is available without -r flag\n  if command -v cowsay &>/dev/null; then\n    gum style --foreground 46 \"  [PASS] cowsay available via composition (no -r needed)\"\n  else\n    gum style --foreground 196 \"  [FAIL] cowsay not available\"\n    gum style --foreground 245 \"         Make sure [include] references flox/elder-library\"\n    errors=$((errors + 1))\n  fi\n\n  # Check if INITIATE_NAME is set\n  if [[ -n \"${INITIATE_NAME:-}\" ]]; then\n    gum style --foreground 46 \"  [PASS] INITIATE_NAME is set: $INITIATE_NAME\"\n  else\n    gum style --foreground 196 \"  [FAIL] INITIATE_NAME is not set\"\n    gum style --foreground 245 \"         Add INITIATE_NAME = \\\"your-name\\\" to [vars] in manifest\"\n    errors=$((errors + 1))\n  fi\n\n  # Check if dark-greeting function exists\n  if declare -f dark-greeting &>/dev/null; then\n    gum style --foreground 46 \"  [PASS] dark-greeting function exists\"\n  else\n    gum style --foreground 196 \"  [FAIL] dark-greeting function not found\"\n    gum style --foreground 245 \"         Add dark-greeting() to [profile] common in manifest\"\n    errors=$((errors + 1))\n  fi\n\n  # Compute sigil hash\n  local INITIATE=\"${INITIATE_NAME:-${USER:-unknown}}\"\n  local sigil_input=\"${INITIATE}:${SIGIL_SALT_3}:permanently-woven\"\n  local sigil_hash\n  sigil_hash=$(_compute_sha256 \"$sigil_input\")\n\n  echo \"\"\n  if [[ $errors -eq 0 ]]; then\n    _mark_complete \"03_binding\" \"$sigil_hash\"\n    gum style --foreground 46 --bold \"Ritual III Complete! Sigil: $sigil_hash\"\n    echo \"\"\n\n    if _orakle_is_running; then\n      _submit_to_orakle 3 \"$sigil_hash\"\n    else\n      gum style --foreground 245 \"  The Orakle sleeps. Start services later for narrative clues.\"\n    fi\n\n    echo \"\"\n    gum style --foreground 245 \"Next: Type 'grimoire' and select Ritual IV, or run 'ritual-04'\"\n  else\n    gum style --foreground 196 \"Ritual III not complete. Fix the errors above and try again.\"\n  fi\n  echo \"\"\n}\n\n# =============================================================================\n# VALIDATE-04: THE TRANSMUTATION\n# =============================================================================\n\nvalidate-04() {\n  echo \"\"\n  gum spin --spinner dot --title \"Validating Ritual IV: The Transmutation...\" -- sleep 1\n\n  local errors=0\n\n  # Check if result-grimoire-page directory exists\n  if [[ -d \"$FLOX_ENV_PROJECT/result-grimoire-page\" ]] || [[ -L \"$FLOX_ENV_PROJECT/result-grimoire-page\" ]]; then\n    gum style --foreground 46 \"  [PASS] result-grimoire-page exists\"\n  else\n    gum style --foreground 196 \"  [FAIL] result-grimoire-page not found\"\n    gum style --foreground 245 \"         Run: flox build grimoire-page\"\n    errors=$((errors + 1))\n  fi\n\n  # Check if built binary exists and is executable\n  if [[ -x \"$FLOX_ENV_PROJECT/result-grimoire-page/bin/grimoire-page\" ]]; then\n    gum style --foreground 46 \"  [PASS] grimoire-page binary exists and is executable\"\n  else\n    gum style --foreground 196 \"  [FAIL] grimoire-page binary not found or not executable\"\n    gum style --foreground 245 \"         Run: flox build grimoire-page\"\n    errors=$((errors + 1))\n  fi\n\n  # Check if output includes initiate name\n  if [[ -x \"$FLOX_ENV_PROJECT/result-grimoire-page/bin/grimoire-page\" ]]; then\n    local output\n    output=$(\"$FLOX_ENV_PROJECT/result-grimoire-page/bin/grimoire-page\" 2>/dev/null)\n    local INITIATE=\"${INITIATE_NAME:-UNNAMED_INITIATE}\"\n    if echo \"$output\" | grep -q \"$INITIATE\"; then\n      gum style --foreground 46 \"  [PASS] Output includes initiate name: $INITIATE\"\n    else\n      gum style --foreground 196 \"  [FAIL] Output does not include initiate name\"\n      gum style --foreground 245 \"         Make sure INITIATE_NAME is set in [vars]\"\n      errors=$((errors + 1))\n    fi\n  fi\n\n  # Compute sigil hash\n  local INITIATE=\"${INITIATE_NAME:-${USER:-unknown}}\"\n  local sigil_input=\"${INITIATE}:${SIGIL_SALT_4}:artifacts-manifested\"\n  local sigil_hash\n  sigil_hash=$(_compute_sha256 \"$sigil_input\")\n\n  echo \"\"\n  if [[ $errors -eq 0 ]]; then\n    _mark_complete \"04_transmutation\" \"$sigil_hash\"\n    gum style --foreground 46 --bold \"Ritual IV Complete! Sigil: $sigil_hash\"\n    echo \"\"\n\n    # Show the built output\n    echo \"\"\n    gum style --foreground 245 \"  Your grimoire page:\"\n    \"$FLOX_ENV_PROJECT/result-grimoire-page/bin/grimoire-page\" 2>/dev/null\n    echo \"\"\n\n    if _orakle_is_running; then\n      _submit_to_orakle 4 \"$sigil_hash\"\n    else\n      gum style --foreground 245 \"  The Orakle sleeps. Start services later for narrative clues.\"\n    fi\n\n    echo \"\"\n    gum style --foreground 245 \"Next: Type 'grimoire' and select Ritual V, or run 'ritual-05'\"\n  else\n    gum style --foreground 196 \"Ritual IV not complete. Fix the errors above and try again.\"\n  fi\n  echo \"\"\n}\n\n# =============================================================================\n# VALIDATE-05: THE AWAKENING\n# =============================================================================\n\nvalidate-05() {\n  echo \"\"\n  gum spin --spinner dot --title \"Validating Ritual V: The Awakening...\" -- sleep 1\n\n  local errors=0\n  local port=\"${ORACLE_PORT:-8666}\"\n\n  # Check if orakle service is responding (retry up to 5 times)\n  local health_response=\"\"\n  local attempt\n  for attempt in 1 2 3 4 5; do\n    health_response=$(curl -s \"http://localhost:$port/health\" 2>/dev/null)\n    if echo \"$health_response\" | jq -e '.status == \"alive\"' &>/dev/null; then\n      break\n    fi\n    if [[ $attempt -lt 5 ]]; then\n      sleep 1\n    fi\n  done\n\n  if echo \"$health_response\" | jq -e '.status == \"alive\"' &>/dev/null; then\n    gum style --foreground 46 \"  [PASS] Orakle service is running and alive\"\n  else\n    gum style --foreground 196 \"  [FAIL] Orakle service is not responding\"\n    gum style --foreground 245 \"         Run: flox services start\"\n    errors=$((errors + 1))\n  fi\n\n  # Compute sigil hash\n  local INITIATE=\"${INITIATE_NAME:-${USER:-unknown}}\"\n  local sigil_input=\"${INITIATE}:${SIGIL_SALT_5}:services-awakened\"\n  local sigil_hash\n  sigil_hash=$(_compute_sha256 \"$sigil_input\")\n\n  echo \"\"\n  if [[ $errors -eq 0 ]]; then\n    _mark_complete \"05_awakening\" \"$sigil_hash\"\n    gum style --foreground 46 --bold \"Ritual V Complete! Sigil: $sigil_hash\"\n    echo \"\"\n\n    # Show health response\n    gum style --foreground 245 \"  Orakle says:\"\n    echo \"$health_response\" | jq . 2>/dev/null | sed 's/^/    /'\n    echo \"\"\n\n    # Auto-submit all previous sigils so the Orakle has the full record.\n    # Recompute sigils with current INITIATE_NAME (not stored hashes, which\n    # may have been computed with $USER before INITIATE_NAME was set).\n    local _sync_user _sync_sigil _sync_salt _sync_suffix _sync_num\n    _sync_user=\"${INITIATE_NAME:-${USER:-unknown}}\"\n    for _sync_num in 1 2 3 4; do\n      eval \"_sync_salt=\\$SIGIL_SALT_${_sync_num}\"\n      case $_sync_num in\n        1) _sync_suffix=\"the-declarative-abyss-awaits\" ;;\n        2) _sync_suffix=\"realms-layered-and-bound\" ;;\n        3) _sync_suffix=\"permanently-woven\" ;;\n        4) _sync_suffix=\"artifacts-manifested\" ;;\n      esac\n      _sync_sigil=$(_compute_sha256 \"${_sync_user}:${_sync_salt}:${_sync_suffix}\")\n      _submit_to_orakle \"$_sync_num\" \"$_sync_sigil\" &>/dev/null\n    done\n    gum style --foreground 245 \"  Previous sigils synced to the Orakle.\"\n\n    _submit_to_orakle 5 \"$sigil_hash\"\n\n    echo \"\"\n    gum style --foreground 245 \"Next: Type 'grimoire' and select Ritual VI, or run 'ritual-06'\"\n  else\n    gum style --foreground 196 \"Ritual V not complete. Fix the errors above and try again.\"\n  fi\n  echo \"\"\n}\n\n# =============================================================================\n# VALIDATE-06: THE ASCENSION\n# =============================================================================\n\nvalidate-06() {\n  echo \"\"\n  gum spin --spinner dot --title \"Validating Ritual VI: The Ascension...\" -- sleep 1\n\n  local errors=0\n\n  # Check if user is authenticated\n  if flox auth status 2>&1 | grep -qi \"logged in\"; then\n    gum style --foreground 46 \"  [PASS] Authenticated with FloxHub\"\n  else\n    gum style --foreground 196 \"  [FAIL] Not authenticated with FloxHub\"\n    gum style --foreground 245 \"         Run: flox auth login\"\n    errors=$((errors + 1))\n  fi\n\n  # Check all previous rituals are complete\n  local prev_rituals=(\"01_summoning\" \"02_layering\" \"03_binding\" \"04_transmutation\" \"05_awakening\")\n  for r in \"${prev_rituals[@]}\"; do\n    if _is_complete \"$r\"; then\n      gum style --foreground 46 \"  [PASS] $r complete\"\n    else\n      gum style --foreground 196 \"  [FAIL] $r not complete\"\n      errors=$((errors + 1))\n    fi\n  done\n\n  # Compute sigil hash\n  local INITIATE=\"${INITIATE_NAME:-${USER:-unknown}}\"\n  local sigil_input=\"${INITIATE}:${SIGIL_SALT_6}:mastery-achieved\"\n  local sigil_hash\n  sigil_hash=$(_compute_sha256 \"$sigil_input\")\n\n  echo \"\"\n  if [[ $errors -eq 0 ]]; then\n    _mark_complete \"06_ascension\" \"$sigil_hash\"\n\n    # Mark completion time\n    local cache_path\n    cache_path=$(_get_progress_cache)\n    if [[ -f \"$cache_path/progress.json\" ]] && command -v jq &>/dev/null; then\n      local tmp completed_at\n      completed_at=$(date -u +\"%Y-%m-%dT%H:%M:%SZ\")\n      tmp=$(mktemp)\n      jq --arg t \"$completed_at\" '.completed_at = $t' \"$cache_path/progress.json\" > \"$tmp\" && \\\n        mv \"$tmp\" \"$cache_path/progress.json\"\n    fi\n\n    gum style --foreground 46 --bold \"Ritual VI Complete! Sigil: $sigil_hash\"\n    echo \"\"\n\n    if _orakle_is_running; then\n      _submit_to_orakle 6 \"$sigil_hash\"\n\n      # Request certificate\n      local cert_response\n      cert_response=$(curl -s -X POST \"$(_orakle_url)/complete\" \\\n        -H \"Content-Type: application/json\" \\\n        -d \"{\\\"user\\\": \\\"${INITIATE_NAME:-${USER:-unknown}}\\\"}\" 2>/dev/null)\n      if [[ -n \"$cert_response\" ]]; then\n        local cert\n        cert=$(echo \"$cert_response\" | jq -r '.certificate // \"\"' 2>/dev/null)\n        if [[ -n \"$cert\" ]]; then\n          echo -e \"$cert\"\n        fi\n      fi\n    else\n      gum style --foreground 245 \"  The Orakle sleeps. Start services to receive your certificate.\"\n      gum style --foreground 245 \"  Run: flox services start && claim-victory\"\n    fi\n\n    echo \"\"\n    gum style \\\n      --border double \\\n      --border-foreground 46 \\\n      --padding \"1 2\" \\\n      \"$(gum style --foreground 46 --bold 'ALL RITUALS COMPLETE!')\" \\\n      \"\" \\\n      \"You have mastered:\" \\\n      \"  - Package installation (pull + install)\" \\\n      \"  - Environment layering (runtime)\" \\\n      \"  - Environment composition (build-time)\" \\\n      \"  - Building reproducible artifacts\" \\\n      \"  - Service management\" \\\n      \"  - Publishing and sharing\" \\\n      \"\" \\\n      \"$(gum style --foreground 129 'The Declarative Order recognizes you.')\"\n    echo \"\"\n  else\n    gum style --foreground 196 \"Ritual VI not complete. Fix the errors above and try again.\"\n  fi\n  echo \"\"\n}\n\n# =============================================================================\n# ORAKLE HELPERS\n# =============================================================================\n\nsubmit-sigil() {\n  local sigil=\"${1:-}\"\n  local ritual=\"${2:-}\"\n\n  if [[ -z \"$sigil\" ]] || [[ -z \"$ritual\" ]]; then\n    echo \"\"\n    gum style --foreground 214 \"Usage: submit-sigil <sigil-hash> <ritual-number>\"\n    gum style --foreground 245 \"  Example: submit-sigil abc123def4567890 1\"\n    echo \"\"\n    return 1\n  fi\n\n  if ! _orakle_is_running; then\n    gum style --foreground 196 \"The Orakle sleeps. Awaken it first:\"\n    gum style --foreground 245 \"  flox services start\"\n    return 1\n  fi\n\n  echo \"\"\n  gum spin --spinner dot --title \"Consulting the Orakle...\" -- sleep 1\n  _submit_to_orakle \"$ritual\" \"$sigil\"\n  echo \"\"\n}\n\nclaim-victory() {\n  local env_ref=\"${1:-}\"\n\n  # Check local progress first\n  local missing_local=()\n  local ritual_keys=(\"01_summoning\" \"02_layering\" \"03_binding\" \"04_transmutation\" \"05_awakening\" \"06_ascension\")\n  for rk in \"${ritual_keys[@]}\"; do\n    if ! _is_complete \"$rk\"; then\n      missing_local+=(\"$rk\")\n    fi\n  done\n  if [[ ${#missing_local[@]} -gt 0 ]]; then\n    echo \"\"\n    gum style --foreground 196 \"  Not all rituals are complete locally.\"\n    gum style --foreground 245 \"  Missing: ${missing_local[*]}\"\n    echo \"\"\n    gum style --foreground 245 \"  Run validate-06 after completing all prior rituals.\"\n    echo \"\"\n    return 1\n  fi\n\n  if ! _orakle_is_running; then\n    gum style --foreground 196 \"The Orakle sleeps. Awaken it first:\"\n    gum style --foreground 245 \"  flox services start\"\n    return 1\n  fi\n\n  echo \"\"\n  gum spin --spinner dot --title \"The Orakle judges your worthiness...\" -- sleep 2\n\n  # Sync all 6 sigils to the Orakle (recompute to handle service restarts)\n  local user=\"${INITIATE_NAME:-${USER:-unknown}}\"\n  local _cv_salt _cv_suffix _cv_sigil _cv_num\n  for _cv_num in 1 2 3 4 5 6; do\n    eval \"_cv_salt=\\$SIGIL_SALT_${_cv_num}\"\n    case $_cv_num in\n      1) _cv_suffix=\"the-declarative-abyss-awaits\" ;;\n      2) _cv_suffix=\"realms-layered-and-bound\" ;;\n      3) _cv_suffix=\"permanently-woven\" ;;\n      4) _cv_suffix=\"artifacts-manifested\" ;;\n      5) _cv_suffix=\"services-awakened\" ;;\n      6) _cv_suffix=\"mastery-achieved\" ;;\n    esac\n    _cv_sigil=$(_compute_sha256 \"${user}:${_cv_salt}:${_cv_suffix}\")\n    _submit_to_orakle \"$_cv_num\" \"$_cv_sigil\" &>/dev/null\n  done\n\n  # Get FloxHub username for token\n  local floxhub_user=\"\"\n  if command -v flox &>/dev/null; then\n    floxhub_user=$(flox auth status 2>&1 | grep -oE 'Logged in as [^ ]+' | sed 's/Logged in as //' || true)\n  fi\n\n  local response\n  response=$(curl -s -X POST \"$(_orakle_url)/complete\" \\\n    -H \"Content-Type: application/json\" \\\n    -d \"{\\\"user\\\": \\\"$user\\\", \\\"env_ref\\\": \\\"$env_ref\\\", \\\"floxhub_user\\\": \\\"$floxhub_user\\\"}\" 2>/dev/null)\n\n  if [[ -n \"$response\" ]]; then\n    local success\n    success=$(echo \"$response\" | jq -r '.success // false' 2>/dev/null)\n    if [[ \"$success\" == \"true\" ]]; then\n      local cert\n      cert=$(echo \"$response\" | jq -r '.certificate // \"\"' 2>/dev/null)\n      if [[ -n \"$cert\" ]]; then\n        echo -e \"$cert\"\n      fi\n      # Display completion token\n      local token\n      token=$(echo \"$response\" | jq -r '.token // \"\"' 2>/dev/null)\n      if [[ -n \"$token\" ]]; then\n        echo \"\"\n        gum style \\\n          --border double \\\n          --border-foreground 46 \\\n          --padding \"1 2\" \\\n          \"$(gum style --foreground 46 --bold 'COMPLETION TOKEN')\" \\\n          \"$(gum style --foreground 245 'Email this to drflox@flox.dev to verify:')\" \\\n          \"\" \\\n          \"$token\"\n        echo \"\"\n      fi\n    else\n      local err\n      err=$(echo \"$response\" | jq -r '.error // \"Unknown error\"' 2>/dev/null)\n      gum style --foreground 196 \"  The Orakle rejects your claim: $err\"\n    fi\n  else\n    gum style --foreground 196 \"  Failed to reach the Orakle\"\n  fi\n  echo \"\"\n}\n\norakle-health() {\n  if ! _orakle_is_running; then\n    gum style --foreground 196 \"The Orakle sleeps.\"\n    gum style --foreground 245 \"  Run: flox services start\"\n    return 1\n  fi\n  echo \"\"\n  gum style --foreground 129 \"Orakle Status:\"\n  curl -s \"$(_orakle_url)/health\" | jq . 2>/dev/null | sed 's/^/  /'\n  echo \"\"\n}\n\n# =============================================================================\n# HINTS - Context-aware based on progress\n# =============================================================================\n\nhint() {\n  local CYAN=\"\\033[0;36m\" YELLOW=\"\\033[1;33m\" NC=\"\\033[0m\"\n  echo \"\"\n  echo -e \"${YELLOW}\\u26e7 A WHISPER FROM THE VOID \\u26e7${NC}\"\n  echo \"\"\n\n  if ! _is_complete \"01_summoning\"; then\n    echo \"  The sacred tool renders text in monumental form.\"\n    echo \"  Search the catalog for that which makes letters... larger.\"\n    echo \"\"\n    echo -e \"  The ancient texts: ${CYAN}https://flox.dev/docs/install-packages/${NC}\"\n  elif ! _is_complete \"02_layering\"; then\n    echo \"  The Elder Libraries exist in a separate realm.\"\n    echo \"  Layer them upon your environment at runtime.\"\n    echo \"\"\n    echo -e \"  The incantation uses ${CYAN}-r${NC} to summon a remote layer.\"\n    echo -e \"  The realm is called ${CYAN}flox/elder-library${NC}.\"\n  elif ! _is_complete \"03_binding\"; then\n    echo \"  Runtime layering is ephemeral. To make it permanent...\"\n    echo \"  Edit the manifest and add an [include] section.\"\n    echo \"\"\n    echo -e \"  Also add your name as ${CYAN}INITIATE_NAME${NC} in [vars].\"\n    echo -e \"  And define ${CYAN}dark-greeting()${NC} in [profile].\"\n  elif ! _is_complete \"04_transmutation\"; then\n    echo \"  The grimoire page source awaits transmutation.\"\n    echo \"  The build configuration is already in the manifest.\"\n    echo \"\"\n    echo -e \"  Use ${CYAN}flox build grimoire-page${NC} to forge the artifact.\"\n  elif ! _is_complete \"05_awakening\"; then\n    echo \"  The Orakle is defined as a service in the manifest.\"\n    echo \"  It waits to be awakened.\"\n    echo \"\"\n    echo -e \"  Use ${CYAN}flox services start${NC} to bring it to life.\"\n  elif ! _is_complete \"06_ascension\"; then\n    echo \"  The final step: publish and push.\"\n    echo \"  Share your work with the world.\"\n    echo \"\"\n    echo -e \"  Use ${CYAN}flox publish${NC} and ${CYAN}flox push${NC}.\"\n    echo -e \"  Then ${CYAN}claim-victory${NC} to receive your certificate.\"\n  else\n    echo \"  All rituals are complete. You are an Adept.\"\n    echo \"  Run 'claim-victory' if you haven't received your certificate.\"\n  fi\n  echo \"\"\n}\n\nreveal() {\n  local CYAN=\"\\033[0;36m\" GREEN=\"\\033[0;32m\" NC=\"\\033[0m\"\n  echo \"\"\n  echo -e \"${GREEN}\\u26e7 THE PATH IS ILLUMINATED \\u26e7${NC}\"\n  echo \"\"\n\n  if ! _is_complete \"01_summoning\"; then\n    echo -e \"  ${CYAN}flox install figlet${NC}\"\n    echo -e \"  ${CYAN}inscribe-sigil${NC}\"\n    echo -e \"  ${CYAN}validate-01${NC}\"\n  elif ! _is_complete \"02_layering\"; then\n    echo -e \"  ${CYAN}flox activate -r flox/elder-library${NC}\"\n    echo -e \"  ${CYAN}elder-whisper${NC}\"\n    echo -e \"  ${CYAN}validate-02${NC}\"\n  elif ! _is_complete \"03_binding\"; then\n    echo -e \"  ${CYAN}ritual-03${NC}  (will prompt for your name and bind automatically)\"\n    echo -e \"  ${CYAN}exit${NC}\"\n    echo -e \"  ${CYAN}flox activate${NC}\"\n    echo -e \"  ${CYAN}validate-03${NC}\"\n  elif ! _is_complete \"04_transmutation\"; then\n    echo -e \"  ${CYAN}flox build grimoire-page${NC}\"\n    echo -e \"  ${CYAN}./result-grimoire-page/bin/grimoire-page${NC}\"\n    echo -e \"  ${CYAN}validate-04${NC}\"\n  elif ! _is_complete \"05_awakening\"; then\n    echo -e \"  ${CYAN}flox services start${NC}\"\n    echo -e \"  ${CYAN}curl -s http://localhost:\\$ORACLE_PORT/health | jq .${NC}\"\n    echo -e \"  ${CYAN}validate-05${NC}\"\n  elif ! _is_complete \"06_ascension\"; then\n    echo -e \"  ${CYAN}flox auth status${NC}  (login if needed: flox auth login)\"\n    echo -e \"  ${CYAN}flox publish grimoire-page${NC}\"\n    echo -e \"  ${CYAN}flox push${NC}\"\n    echo -e \"  ${CYAN}claim-victory <your-username>/dr-flox${NC}\"\n    echo -e \"  ${CYAN}validate-06${NC}\"\n  else\n    echo \"  All rituals complete! Run 'claim-victory' for your certificate.\"\n  fi\n  echo \"\"\n}\n\n# =============================================================================\n# WELCOME MESSAGE ON ACTIVATION\n# =============================================================================\n\n_next_ritual_name() {\n  if ! _is_complete \"01_summoning\"; then echo \"Ritual I: The Summoning\"\n  elif ! _is_complete \"02_layering\"; then echo \"Ritual II: The Layering\"\n  elif ! _is_complete \"03_binding\"; then echo \"Ritual III: The Binding\"\n  elif ! _is_complete \"04_transmutation\"; then echo \"Ritual IV: The Transmutation\"\n  elif ! _is_complete \"05_awakening\"; then echo \"Ritual V: The Awakening\"\n  elif ! _is_complete \"06_ascension\"; then echo \"Ritual VI: The Ascension\"\n  else echo \"All rituals complete!\"\n  fi\n}\n\n_next_ritual_cmd() {\n  if ! _is_complete \"01_summoning\"; then echo \"ritual-01\"\n  elif ! _is_complete \"02_layering\"; then echo \"ritual-02\"\n  elif ! _is_complete \"03_binding\"; then echo \"ritual-03\"\n  elif ! _is_complete \"04_transmutation\"; then echo \"ritual-04\"\n  elif ! _is_complete \"05_awakening\"; then echo \"ritual-05\"\n  elif ! _is_complete \"06_ascension\"; then echo \"ritual-06\"\n  else echo \"claim-victory\"\n  fi\n}\n\n# Check if ritual-03 binding was inscribed but not yet validated (needs re-activate)\n_binding_needs_reactivate() {\n  local cache_path\n  cache_path=$(_get_progress_cache)\n  [[ -f \"$cache_path/binding_inscribed\" ]] && ! _is_complete \"03_binding\"\n}\n\nif [[ -n \"${_DRFLOX_WELCOME_SHOWN:-}\" ]]; then\n  : # Skip welcome on layered or re-entrant activation\nelif _is_complete \"01_summoning\"; then\n  export _DRFLOX_WELCOME_SHOWN=1\n  local completed\n  completed=$(